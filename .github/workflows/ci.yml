name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Relaxed gate for demo repos: prove the app type-checks, lints and builds.
# (format:check, coverage tests and e2e were dropped — they were template
# scaffolding never satisfied and add noise without value for a sales demo.)
jobs:
  quality-build:
    name: Quality & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
